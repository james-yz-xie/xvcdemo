window.DEMO_ARTICLE = ["对话安德森：AI革命的万亿美金之问","","技术革命：八十年一遇的AI巅峰","","AI公司的收入增长与产品演变","","Jen: 目前AI公司的商业表现和收入增长情况如何？","","Mark: 新一波AI公司的收入增长正处于史无前例的爆发期。这种增长是真实的客户需求转化为银行账户中的资金，其增长速度是前所未有的。我们观察到，领先的AI公司和拥有突破性产品的公司，其收入增长速度超过了我以往见过的任何水平。","","目前的AI产品形态还处于非常早期的阶段，我怀疑5到10年后人们使用的产品形态会与现在截然不同。我相信，随着技术的发展，产品会变得更加复杂和先进。我们还有很长的路要走。","","战略选择与风投策略","","Jen: 面对AI带来的重大战略和经济疑问，公司与风投机构的应对策略有何不同？","","Mark: 这些是价值数万亿美元的问题，目前还没有定论。一旦有人证明了某种能力是可行的，其他人（即使资源较少）似乎也不难追赶。当一家公司面临根本性的战略或经济挑战时，这通常是一个巨大的危机。公司必须回答这些问题，如果答错了，就会陷入真正的困境。","","作为风险投资机构，我们可以同时在多种策略上押注。对于我们确定的每一个有成功可能的策略，我们都在积极地进行投资。","","AI的公众认知与实际偏好","","Jen: 公众对AI的认知与其实际行为之间是否存在差异？","","Mark: 了解人们的想法有两种方式：一是询问，二是观察。在人类活动的许多领域，人们的口头回答往往与实际行为截然不同。如果你对美国选民进行民意调查，他们似乎对AI充满恐慌，担心它会夺走工作并毁掉一切。但如果你观察他们的'显性偏好'，你会发现他们其实都在使用AI。","","AI革命的历史定位与当前阶段","","Jen: 我们正处于AI革命的中心。Mark，你认为我们现在处于第几局？你最兴奋的是什么？","","Mark: 首先，我认为这是我一生中见过的最大的技术革命。其规模显然超过了互联网，可以与微处理器、蒸汽机和电力，甚至是轮子的发明相提并论。","","计算机工业在过去80年里一直遵循'加法机'的路径，制造出了极其精密但无法与人类顺畅交流的机器。而早在1943年，先驱们就提出了模拟人类认知的神经网络理论，但此后经历了数十年的'AI寒冬'。直到2022年底ChatGPT的出现，这一路径终于结出了硕果。","","我们现在仅处于这场革命交付期的第三年左右。硅谷的神奇之处在于它能不断重新分配人才与资本，为每一波技术浪潮积累势能。我每天都会被新的AI研究论文和初创产品所震撼。虽然过程中会有波折和成本挑战，但其展现出的能力是真正具有魔力的。目前的收入增长速度证明了我们仍处于早期阶段，未来的产品将比现在先进得多。","","智能经济：收入爆发与成本塌陷","","AI业务模式、普及速度与成本收益的深度解析","","John: 关于AI领域，有一个很大的质疑是：虽然其收入规模巨大，但支出似乎也同步增长，导致收支难以平衡。在这个话题中，人们通常遗漏了哪些关键点？","","Mark: AI行业目前主要存在两种核心业务模式：消费者模式和企业/基础设施模式。","","首先，我们需要区分AI革命与互联网革命的差异。互联网的普及经历了漫长的物理基础设施建设期，涉及光纤铺设、移动基站建设以及智能终端的普及，历时数十年。而AI不同，它依托于已经覆盖全球50亿至60亿人口的互联网作为载体，其扩散速度是'光速级'的。你无法'下载'电力或室内排水系统，但你可以直接'下载'AI。这种极高的普及效率是前所未有的。","","在变现方面，AI公司的定价策略比传统的SaaS公司更具灵活性。目前，每月200至300美元的个人消费级定价正逐渐常规化，这种敢于探索高客单价的尝试为收入增长打开了巨大空间。","","在企业端，智能的价值体现在直接的业务回报上，如提升客服效率、增加销售额、降低流失率或优化营销活动。其核心商业模式是'按需付费的Token（代币）'。","","最重要的一点是，AI的单位成本下降速度甚至超过了摩尔定律。虽然目前面临GPU和数据中心的短缺，但根据历史规律，任何可物理复制的短缺资源最终都会在巨大的需求推动下走向过剩。未来十年，AI的单位投入成本将骤降，而价格弹性将驱动更为庞大的需求增长。从宏观来看，AI对个人和企业产生的底层价值极高，其营收增长潜力和商业前景非常乐观。","","硬件格局：芯片多元化与大小模型之争","","GPU优化与模型规模演进趋势","","Mark: AWS最近提到，他们使用的GPU寿命可以延长到7年以上。这是否意味着GPU的货架期正在延长，且他们能比前几个周期更好地进行优化？","","John: 没错，这是一个非常重要的观察。这引出了关于大模型与小模型之争的不同理论。","","目前数据中心的建设主要围绕大模型的训练和服务展开，但同时「小模型革命」也在发生。通常在领先模型发布6到12个月后，就会出现能力相当的小模型。这种「追赶功能」让大模型的能力被迅速压缩，并以更低的成本提供。","","例如中国的Kimi模型，其推理能力在基准测试中已接近GPT-5，且能运行在普通电脑上。这意味着企业可以低成本地本地部署高性能推理能力。","","我认为AI行业未来会像计算机行业一样：少数「上帝模型」作为超算存在于云端，而大量更小、更经济的模型会渗透到各种嵌入式系统和物理设备中。虽然大模型永远最聪明，但小模型将占据应用的主流。","","AI芯片市场的周期性与竞争格局","","Mark: 目前AI芯片市场处于短缺状态，您认为未来几年的供应和竞争格局会如何演变？","","John: 芯片行业的历史规律是「短缺最终会变成过剩」。英伟达目前的成功和高额利润已经成为了整个行业的「信号弹」，吸引了AMD、超大规模云服务商以及中国企业进入竞争。","","目前英伟达确实是极优秀的公司，但随着竞争加剧，预计五年内AI芯片将变得廉价且供应充足。这对我们投资的初创公司来说是极大的利好，将显著优化其经济效益。","","从GPU到专用AI芯片的演进","","Mark: 初创公司也开始尝试新的芯片设计，这是否会改变AI依赖GPU的现状？","","John: AI目前运行在GPU上其实带有一种历史偶然。GPU（图形处理器）原本是为游戏和绘图设计的，只是其并行架构恰好适合加密货币和AI计算。在过去30年的GPU战争中，英伟达脱颖而出，并巧妙地利用了这一架构优势。","","如果今天从零开始设计AI芯片，我们不会构建完整的GPU，而是会开发更高效、更具经济性的专用AI芯片。目前许多初创公司正在尝试这一方向。虽然白手起家很难，但他们可能通过独立成功或被巨头收购来实现规模化。","","此外，韩国、日本和中国都在构建自己的芯片生态。未来AI芯片的选择将更加多元化，这将是一场我们密切关注的巨大战斗。","","地缘博弈：中美竞速下的AI冷战","","中国开源AI模型的崛起与美中地缘政治竞争","","Mark: 既然目前一些最优秀的开源模型来自中国，这是否令人担忧？你在华盛顿交流时，大家如何看待这个话题？考虑到中国在太阳能和汽车市场的历史表现，美国公司是否担心中国正在通过开源生态来获取市场份额并最终主导该领域？","","John: 针对中国在AI领域的崛起及其影响，可以从以下几个维度来分析：","","1. 中美关系的复杂性：当前关于「新冷战」的讨论非常激烈。但与美苏冷战不同，中美经济高度交织。中国是全球供应链的核心，其治理模式依赖于高就业率，而美国市场对其出口至关重要。这种深度互补意味着双方在竞争中存在极强的相互依赖。","","2. 华盛顿的战略视角：过去十年，华盛顿两党已达成共识，将中国视为地缘政治对手。AI竞争不仅是经济问题，更是地缘政治的核心。目前，全球AI研发呈现美中两强争霸的态势，其他地区尚未进入核心赛道。","","3. 中国AI软件的崛起：中国在软件领域表现强劲，DeepSeek的发布是一个「超新星时刻」。作为一家量化对冲基金背景的公司，其推出的开源模型在效能和规模控制上令人震惊。此外，阿里（Qwen）、月之暗面（Kimmy）、腾讯、百度和字节跳动等公司也展现了极强的竞争力。","","4. 硬件与机器人的布局：虽然中国在芯片领域仍在全力追赶（如华为），但在机器人领域，中国凭借过去三十年积累的完整机电供应链，已经具备了先发优势。","","5. 政策风向的转变：中国开源模型的涌现被华盛顿部分人视为一种「倾销」或行业商品化策略。但这让美国意识到这不再是「单人赛」，而是「双雄争霸」。因此，美国的政策焦点已从两年前的单纯限制与禁令，转向了更具竞争性的思路。","","监管挑战：联邦立法与创新自由","","各州AI立法的乱象与联邦监管现状","","Jen: 实际上，目前全美50个州出台50套不同AI法律的现状，似乎会将我们在AI竞赛中置于极其不利的境地。目前的整体应对计划是怎样的？相关人士是否意识到这种做法对行业发展是灾难性的？目前大多数人对此持什么立场？","","Mark: 目前联邦层面的风险较低。两年前我非常担心联邦层面会出现破坏性的AI立法，但现在华盛顿特区两党都意识到，不能出台任何阻碍美国在AI领域超越中国的政策。","","这种压力目前已转向各州。在联邦制下，各州有权自行立法。目前我们正跟踪50个州约200项AI相关提案，且这不仅发生在蓝色州，红色州也同样存在。","","尽管AI具有跨州属性，理应由联邦政府统一监管，但此前试图在大型法案中加入「禁止州级监管」的尝试在最后时刻流产了。目前我们正与政府及国会进行新一轮讨论，试图让联邦政府在这一国家利益问题上发挥主导作用。","","严苛法规与开源生态的危机","","Jen: 科罗拉多州去年通过了一项非常严苛的监管法案，引发了当地初创生态系统的强烈反对，现在他们似乎在尝试修正算法歧视等极端条款。您对此如何看待？","","Mark: 加州的SB1047法案是这类严苛立法的典型，它模仿了欧盟的《AI法案》。欧盟的做法实际上已经扼杀了欧洲的AI创新，甚至导致苹果和Meta等公司不在欧洲推出领先的AI功能。欧洲人甚至直言：'如果我们不能在创新上领先，至少可以在监管上领先。'但这种'自我伤害'已经引起了反思，例如《德拉吉报告》就指出了过度监管对竞争力的损害。","","加州的这项法案如果通过，将毁灭加州的AI发展。它最荒谬的一点是要求开源开发者为多年后的下游滥用承担连带责任。例如，一个独立开发者发布的开源模型在五年后被用于核电站并引发事故，开发者竟然要承担法律责任。这会彻底扼杀开源生态、初创企业和学术研究。幸运的是，加州州长在最后时刻否决了它。","","科技领袖在政策博弈中的使命","","Jen: 关于政策参与，这是一个集体行动的问题。理论上每家风投和科技公司都应该参与，但实际上大多数人都保持沉默。为什么你们（a16z）决定站出来承担这些博弈？","","Mark: 我和Ben（本·霍罗维茨）认为，这件事的影响实在太大了。这关系到创新的自由和初创企业的生存。","","如果行业内没有人出来对抗这些错误的政策，我们就无法掌握自己的命运。尽管这涉及大量的政策游说和跨党派协调工作，但我们认为这是作为行业领导者必须付出的成本。我们致力于以极度专业且符合国家利益的方式，确保技术创新的自由不被错误立法葬送。","","价值捕捉：按需计费与价值定价","","AI定价模式：按需计费与价值定价的深度解析","","Jen: 在我们结束关于AI的话题之前，我想请教一个提交的问题：你认为对于AI来说，按需计费（Usage-based）或效用计费是比按席位（Seats）计费更合适的方式吗？","","Mark: 这是一个非常出色且价值万亿美元的问题。这个问题的答案将驱动未来数万亿美元的市场价值。","","目前，处于「云服务战争」中的大型科技公司（如AWS、Azure、Google Cloud）正通过其云端业务，将具有「魔力」的AI技术以按需计费的方式推向全球。对于初创企业来说，这是一种美妙的模式，因为它消除了巨额的固定成本。初创公司可以像购买饮用水一样按需购买「智能代币」，这极大地降低了构建AI应用的门槛。目前，这种模式运作良好，云服务商也对利润和增长感到满意。","","然而，这并不意味着所有应用层AI的最佳定价都应是「按代币计费」。定价的一项核心原则是：尽可能避免按成本定价，而要按价值定价。特别是当你向企业销售时，你应该获取你所创造的业务价值的一定比例。","","我们看到许多初创公司正在进行定价实验。如果AI能胜任程序员、医生、律师、教师或护士的工作，那么就应该根据它创造的价值，或者它带来的边际生产力提升来定价。这种人机共生的效率提升，值得按比例进行价值分成。","","此外，高价格的价值往往被低估了。虽然直觉认为低价对客户更好，但实际上高价格往往对客户有利。高利润意味着供应商可以投入更多研发资金，使产品改进得更快、更好。尽管客户在调查中不会直说，但高价格通过驱动供应商变得更优秀，最终让客户获益。目前AI创业者们愿意尝试这些实验，这种态度对行业发展非常健康。","","行业终局：开源、闭源与初创公司机遇","","开源与闭源的万亿美元之争","","Jen: 我想回到一个你之前简单提到的'万亿美元问题'：开源与闭源模型谁会最终胜出？你对此如何判断？","","Mark: 我认为这个问题目前依然是开放的。","","一方面，大型实验室的闭源模型正以极快的速度进化。尽管市场上偶尔会出现对模型能力触及天花板的担忧，但前线研发人员非常乐观，他们拥有海量的新思路来解决扩展性问题并持续做出新发现。闭源模型在短期内仍将保持快速的性能增长。","","另一方面，开源模型也在持续进步。每隔一段时间就会有像'Kimmy'这样的优秀项目发布，展现出在极小尺寸下实现强大能力的潜力。更重要的是，开源是极佳的教育工具，它让全球的计算机专业师生、普通工程师乃至创业者都能学习如何构建最先进的AI，推动了知识的快速普及。这种知识的传播打破了技术被少数巨头垄断的局面。","","目前AI人才极度稀缺，薪资甚至超过了职业运动员。但稀缺会促成过剩，随着教育的普及，大量年轻人才在过去几年内迅速成长。因此，这依然是一场长跑。最终的答案可能是两者并存：既有追求极致智能的最强模型，也有遍布各处、成本极低的小型模型市场。","","现任者与初创企业的格局演变","","John: 你曾在两年前提出过'现任者与初创企业谁能获胜'的问题，当时形势还不透明。现在的格局是否已经发生了剧变？你如何评估现状？","","Mark: 格局确实发生了巨变。首先，谷歌、Meta、亚马逊和微软等科技巨头正以前所未有的进攻性投入竞争。同时，像OpenAI和Anthropic这样的公司已成为'新现任者'。而在过去两年中，甚至诞生了像xAI这样在不到12个月内就从零起步追平顶尖水平的'即时现任者'。在欧洲，Mistral（原文ML/Mald）也成为了卓越的AI冠军企业。","","此外，AI应用类公司正在爆发。此前行业内有一种偏见，称这类公司为'GPT套壳'，认为它们只是简单的转发器，没有核心价值。但事实恰恰相反，领先的应用公司（如Cursor）正在向深层技术公司转型。他们不仅使用多种模型进行定制化开发，还在进行逆向整合，利用对特定领域的深度理解来构建自有模型。如果他们不满于向云服务商购买Token的经济效益，还可以直接利用开源模型进行部署。因此，优秀的AI应用公司本质上是全栈的技术公司。","","模型演进与风投的组合策略","","Jen: 当谈到这些应用公司开发自有模型时，你认为他们追求的是所谓的'上帝模型'还是小模型？","","Mark: 有些公司确实已经开始开发大模型了。过去两年我们学到的重要一点是：领先地位并非永恒。三年前人们认为OpenAI无可追赶，但随后Anthropic追了上来。接着，xAI在不到一年的时间里就达到了同等水平。这种动态说明，一旦有人证明了某种能力的可行性，后来者追赶的门槛并没有想象中那么高。","","今年初，中国的DeepSeek等四家公司也实现了赶超。这种全球性的竞争给美国系统带来了压力，但也证明了初创生态系统的活力。作为风险投资机构，我们的优势在于不需要像单一公司那样只赌一条路。我们采取组合策略，同时押注大模型与小模型、开源与闭源、基础模型与垂直应用。世界是复杂的，多种战略可能同时奏效。即使某条路径失败，我们的组合中也会有其他成功的替代方案，这就是我们拥有多种获胜方式的信心来源。","","风投哲学：A16Z的周期观与公开立场","","合伙人之间的分歧与决策机制","","Jen: 在您与 Ben Horowitz 超过 30 年的合作中，有哪些事情是你们存在分歧但最终达成共识（Disagree and Commit）的？","","Mark: 我们就像一对老夫老妻，虽然一直在争论，但几乎总能达成共识，目前并没有那种我完全无法接受却又不得不妥协的重大分歧。目前我们讨论最多的、也最具张力的话题是公司的'公众影响力'（Public Footprint）。一般来说，我们在公众视野中越活跃、越敢于表达立场，就越能吸引优秀的创业者，因为创始人更倾向于与勇敢且观点鲜明的合伙人合作，这已成为我们的核心竞争优势。但与此同时，公开透明也伴随着外部性风险。我们一直在尝试平衡这一点，特别是针对华盛顿的政策制定者，通过播客、文章和视频输出观点，让他们更好地理解技术变革，而不是仅仅依赖对硅谷有偏见的媒体信息。我和 Ben 会反复权衡在一些敏感话题上的发声频率和尺度。","","AI 重组的成效与行业浪潮判断","","Jen: 自 A16Z 围绕 AI 进行重组并启动 AD（American Dynamism）已过去两年，您认为哪些决策是正确的？回看过去，是否有被低估或遗漏的地方？","","Mark: 我认为押注 AI 的大方向是非常正确的。风险投资的逻辑核心在于抓住底层架构的变革浪潮，因为只有技术发生根本性改变时，初创企业才能在巨头反应过来之前通过创意占据市场。历史证明，最成功的风投机构都是能从一波浪潮切换到另一波浪潮的。我曾经很惊讶于有些同行决定不参与加密货币浪潮，因为紧跟新技术正是这份工作的本质。AI 也是如此，有些公司在全力投入，有些则在观望。目前，我们的 AD 业务表现很好，它本身也是 AI 的受益者，比如 AI 对能源和材料领域的需求拉动。此外，AI 与加密货币、生物医疗及医疗保健的交叉领域也展现出巨大的潜力。目前我们并不觉得缺失了某个垂直赛道，现阶段的核心是执行好手头的业务，并成为投资组合公司最优秀的合伙人。","","社会镜像：显性偏好与火星愿景","","AI社会恐慌与实际采纳的矛盾","","Jen: 关于AI取代工作的讨论很多，但实际上能源和数据中心等相关领域的需求正前所未有地增长。您认为社会是否已经为技术采纳做好了准备？如何加速这种采纳的收敛，以跟上技术实施的速度？","","Mark: 历史上新技术出现时总会引发周期性的社会恐慌，无论是印刷机的发明，还是过去200年里多次出现的自动化恐慌。当前的AI焦虑与马克思主义对失业的恐惧或1964年的'三重革命委员会'宣言非常相似。人们在调查中往往表达担忧，但在'显性偏好'中却积极拥抱AI。数据显示，人们不仅在工作中使用ChatGPT，还用它处理私人情感或健康咨询，因为这项技术切实解决了他们的实际需求。尽管公众讨论会持续波动，但历史证明技术最终会广泛普及，并成为社会不可或缺的一部分。","","近期认知改变的经历","","Jen: 我们进入快速问答环节。您最近在哪些事情上改变了主意？如果是受比您年轻的人启发，会有额外加分。","","Mark: 改变主意几乎是我每天的常规体验。我经常会针对'某件事是否可能实现'这一认知进行修正。这种改变通常源于我读到的内容或与人的交流，而且确实经常受到年轻人的启发，这也是保持年轻心态的一种方式。","","关于人体冷冻技术的看法","","Jen: 您计划进行人体冷冻吗？","","Mark: 以目前的人体冷冻技术来看，我没有这个打算。该技术的历史记录并不理想，有些相关的案例甚至令人毛骨悚然。不过，未来的发展谁也无法预料。","","在巨大影响力下保持清醒的方法","","Jen: 当您的影响力大到可能扭曲周围现实时，您如何保持清醒并脚踏实地？","","Mark: 现实扭曲效应确实存在，虽然它在推动目标上有优势，但准确认知现实更为重要。首先，我的合伙人们非常直率，会随时指出我的错误。其次，风险投资行业本质上是时刻暴露在现实反馈中的。投资的成败会直接证明分析的对错，这种'被打脸'的经历是保持谦逊的最好方式。即便你认为自己分析卓越，现实往往会迅速证明你的无知。此外，整个互联网每天都在提醒我哪里做得不对，这也有助于我保持清醒。","","对前往火星的看法","","Jen: 如果机会成熟，您计划前往火星吗？","","Mark: 大概不会。我甚至不太愿意离开加州或我自己的房子，也许以后我会通过VR进行体验。虽然我个人没有这个计划，但我相信伊隆（马斯克）能够实现它，也许十年内往返火星会成为常规。我知道很多人，包括您在内，都对此充满期待。"].join(String.fromCharCode(10));
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');
    body { font-family: 'Inter', 'Noto Serif SC', sans-serif; }
    .article-body { font-family: 'Noto Serif SC', serif; line-height: 1.8; }
    .article-body h2 { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .typing-cursor::after { content: '|'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
    .chapter-section { position: relative; }
    .chapter-btn { opacity: 0; transition: opacity 0.2s; }
    .chapter-section:hover .chapter-btn { opacity: 1; }
    .spinner { border: 2px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <!-- Header -->
    <header class="mb-10">
      <h1 class="text-3xl font-bold text-slate-900 mb-2">AI 视频文章生成器</h1>
      <p class="text-slate-500">输入 YouTube 视频链接，AI 将基于字幕生成中文对话文章</p>
    </header>

    <!-- Input Form -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">YouTube 视频链接</label>
        <input id="videoUrl" type="text" placeholder="https://www.youtube.com/watch?v=..."
          class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm"
          value="https://www.youtube.com/watch?v=xRh2sVcNXQ8"
        >
        <div class="mt-2 flex gap-2 flex-wrap">
          <button onclick="setVideo('xRh2sVcNXQ8')"
            class="text-xs bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200 rounded px-2 py-1 transition">🎬 AI Bubbles</button>
        </div>
      </div>
    </div>

    <!-- Two Column Layout: Left = Subtitles, Right = Article -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Left: Extract Subtitles + Subtitle Result -->
      <div>
        <!-- Extract Controls -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
          <div class="flex items-center justify-between gap-3">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide shrink-0">第一步：提取字幕</span>
            <div class="flex items-center gap-2">
              <select id="extractModelSelect"
                class="px-2 py-1 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="live" selected>🌐 实时提取（YouTube）</option>
                <option value="demo">🎬 Demo 硬编码</option>
              </select>
              <button id="extractBtn" onclick="extractSubtitles()"
                class="bg-slate-800 hover:bg-slate-900 text-white font-medium px-4 py-1.5 rounded-lg transition flex items-center gap-2 text-sm"
              >
                <span id="extractBtnText">🔍 提取</span>
                <div id="extractSpinner" class="spinner hidden" style="width:14px;height:14px;border-width:1.5px;"></div>
              </button>
            </div>
          </div>
        </div>

        <!-- Subtitle Result -->
        <div id="subtitlePanel" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-6">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-sm font-semibold text-slate-700 flex items-center gap-2">
              <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              字幕提取结果
            </h3>
            <div class="flex items-center gap-2">
              <span id="subtitleStatus" class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">等待中</span>
              <button onclick="extractSubtitles()" class="text-xs text-blue-600 hover:text-blue-800 underline">重试</button>
            </div>
          </div>

          <div id="subtitleProgress" class="hidden mb-3 text-sm text-slate-500 flex items-center gap-2">
            <div class="spinner" style="width:16px;height:16px;border-width:1.5px;"></div>
            <span id="subtitleProgressText">正在连接 YouTube...</span>
          </div>

          <div id="subtitleError" class="hidden mb-3 text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>

          <div id="subtitleSuccess" class="hidden">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-xs text-slate-500">共 <span id="subtitleLength" class="font-medium"></span> 字符</span>
              <span id="subtitleSource" class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600"></span>
              <span id="subtitleDemoBadge" class="hidden text-xs px-2 py-0.5 rounded-full bg-amber-50 text-amber-600 font-medium">🎬 演示数据</span>
            </div>
            <div class="text-xs text-slate-500 mb-1">原始字幕内容：</div>
            <div id="subtitleContent" class="p-3 bg-slate-50 rounded-lg text-xs text-slate-600 font-mono whitespace-pre-wrap break-words border border-slate-200"></div>
          </div>
        </div>
      </div>

      <!-- Right: Generate Article + Article Output -->
      <div id="generateSection" class="hidden">
        <!-- Generate Controls -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-6">
          <div class="flex items-center justify-between gap-3 mb-3">
            <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide shrink-0">第二步：生成文章</span>
            <div class="flex items-center gap-2 flex-wrap justify-end">
              <select id="generateModelSelect"
                class="px-2 py-1 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="gemini" selected>🌐 Gemini 2.0 Flash（云端）</option>
                <option value="kimi">🌙 Kimi Code（Moonshot）</option>
                <option value="lmstudio">💻 LM Studio（本地）</option>
              </select>
              <select id="generateModeSelect"
                class="px-2 py-1 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="live" selected>✨ AI 实时生成</option>
                <option value="demo">📄 Demo 硬编码</option>
              </select>
              <button id="generateBtn" onclick="generateArticle()"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-1.5 rounded-lg transition flex items-center gap-2 text-sm"
              >
                <span id="generateBtnText">✨ 生成</span>
                <div id="generateSpinner" class="spinner hidden" style="width:14px;height:14px;border-width:1.5px;"></div>
              </button>
            </div>
          </div>
          <details class="group">
            <summary class="text-xs font-medium text-slate-500 cursor-pointer hover:text-slate-700 select-none list-none flex items-center gap-1">
              <svg class="w-3 h-3 transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              生成要求（可选）
            </summary>
            <div class="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
              <input id="reqTask" type="text" placeholder="任务类型，如：深度分析" class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <input id="reqStyle" type="text" placeholder="输出风格，如：正式、轻松" class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <input id="reqAudience" type="text" placeholder="目标受众，如：投资人" class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <input id="reqConstraints" type="text" placeholder="约束条件，如：聚焦商业模式" class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
            </div>
          </details>
        </div>

        <!-- Article Output -->
        <div id="article" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 max-h-[70vh] overflow-y-auto">
          <div class="p-6">
            <div id="articleContent" class="article-body text-slate-800 text-[15px]"></div>
            <div id="typingIndicator" class="hidden mt-2 text-blue-500 text-sm typing-cursor">生成中</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = location.origin;
    let sessionId = null;
    let chapters = [];
    let timeoutId;
    let renderTimer = null;
    const TIMEOUT_MS = 30000;
    let currentSubtitles = '';
    let currentVideoId = '';



    function setVideo(id) {
      document.getElementById('videoUrl').value = 'https://www.youtube.com/watch?v=' + id;
      // Reset panels
      document.getElementById('subtitlePanel').classList.add('hidden');
      document.getElementById('article').classList.add('hidden');
      currentSubtitles = '';
      currentVideoId = '';
    }

    async function extractSubtitles() {
      console.log('extractSubtitles called');
      const url = document.getElementById('videoUrl').value.trim();
      const btn = document.getElementById('extractBtn');
      const btnText = document.getElementById('extractBtnText');
      const spinner = document.getElementById('extractSpinner');
      const panel = document.getElementById('subtitlePanel');
      const status = document.getElementById('subtitleStatus');
      const progress = document.getElementById('subtitleProgress');
      const progressText = document.getElementById('subtitleProgressText');
      const error = document.getElementById('subtitleError');
      const success = document.getElementById('subtitleSuccess');
      const generateSection = document.getElementById('generateSection');

      if (!url) { alert('请输入 YouTube 链接'); return; }

      // Reset UI
      btn.disabled = true;
      btnText.textContent = '提取中...';
      spinner.classList.remove('hidden');
      panel.classList.remove('hidden');
      status.textContent = '提取中';
      status.className = 'text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-600';
      progress.classList.remove('hidden');
      progressText.textContent = '正在连接 YouTube...';
      error.classList.add('hidden');
      success.classList.add('hidden');
      generateSection.classList.add('hidden');
      document.getElementById('article').classList.add('hidden');
      currentSubtitles = '';
      currentVideoId = '';

      try {
        progressText.textContent = '正在请求视频页面...';
        const extractMode = document.getElementById('extractModelSelect').value;
        console.log('Extract mode:', extractMode);
        const res = await fetch(API_BASE + '/api/subtitles', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoUrl: url, forceLive: extractMode === 'live' })
        });
        console.log('Response status:', res.status);
        const data = await res.json();
        console.log('Response data:', data);

        if (!res.ok) throw new Error(data.error || '字幕提取失败');

        // Success
        currentSubtitles = data.subtitles;
        currentVideoId = data.videoId;

        progress.classList.add('hidden');
        status.textContent = '成功';
        status.className = 'text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-600';

        success.classList.remove('hidden');
        document.getElementById('subtitleLength').textContent = data.subtitles.length.toLocaleString();
        document.getElementById('subtitleSource').textContent = data.source === 'live' ? '在线提取' : '硬编码字幕';
        document.getElementById('subtitleDemoBadge').classList.toggle('hidden', data.source === 'live');
        document.getElementById('subtitleContent').innerText = data.subtitles;

        // Show generate button
        generateSection.classList.remove('hidden');
        console.log('Extract success, showing generate section');

      } catch (err) {
        console.error('Extract error:', err);
        progress.classList.add('hidden');
        status.textContent = '失败';
        status.className = 'text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-600';
        error.textContent = err.message;
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = '🔍 提取';
        spinner.classList.add('hidden');
      }
    }

    const DEMO_ARTICLE = window.DEMO_ARTICLE || '';

    async function generateArticle() {
      const btn = document.getElementById('generateBtn');
      const btnText = document.getElementById('generateBtnText');
      const spinner = document.getElementById('generateSpinner');
      const article = document.getElementById('article');
      const content = document.getElementById('articleContent');
      const indicator = document.getElementById('typingIndicator');

      if (!currentSubtitles) { alert('请先提取字幕'); return; }

      const reqs = {};
      const task = document.getElementById('reqTask').value.trim();
      const style = document.getElementById('reqStyle').value.trim();
      const audience = document.getElementById('reqAudience').value.trim();
      const constraints = document.getElementById('reqConstraints').value.trim();
      if (task) reqs.taskType = task;
      if (style) reqs.style = style;
      if (audience) reqs.audience = audience;
      if (constraints) reqs.constraints = constraints;

      btn.disabled = true;
      btnText.textContent = '生成中...';
      spinner.classList.remove('hidden');
      article.classList.remove('hidden');
      content.innerHTML = '';
      indicator.classList.remove('hidden');
      sessionId = null;
      chapters = [];

      let rawText = '';

      const generateMode = document.getElementById('generateModeSelect').value;
      const generateModel = document.getElementById('generateModelSelect').value;

      try {
        if (generateMode === 'demo') {
          // Demo mode: local article, zero network
          rawText = DEMO_ARTICLE;
          sessionId = 'demo-session';
        } else if (generateModel === 'lmstudio') {
          // LM Studio: direct call from browser, real-time streaming
          rawText = await streamLMStudioDirect(currentSubtitles, reqs, content, indicator);
          sessionId = 'lmstudio-session';
          // Skip typewriter - already displayed in real-time
          content.innerHTML = marked.parse(rawText, { async: false });
          indicator.classList.add('hidden');
          add5w1hButtons(content);
          btn.disabled = false;
          btnText.textContent = '✨ 第二步：生成文章';
          spinner.classList.add('hidden');
          return;
        } else {
          // Cloud models: call API with real-time streaming display
          const genRes = await fetch(API_BASE + '/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              videoId: currentVideoId,
              subtitles: currentSubtitles,
              requirements: Object.keys(reqs).length > 0 ? JSON.stringify(reqs) : undefined,
              model: generateModel
            })
          });

          const reader = genRes.body.getReader();
          const decoder = new TextDecoder();
          let hasReceivedData = false;
          let chunkCount = 0;

          timeoutId = setTimeout(() => {
            if (!hasReceivedData) {
              content.innerHTML = '<div class="text-amber-600 text-sm">等待超时，请检查 API Key 配置</div>';
            }
          }, TIMEOUT_MS);

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            hasReceivedData = true;
            clearTimeout(timeoutId);
            rawText += chunk;
            chunkCount++;

            const errMatch = rawText.match(/<!--ERROR:([\s\S]+?)-->/);
            if (errMatch) throw new Error(errMatch[1]);

            indicator.textContent = '生成中 (' + chunkCount + ' chunks, ' + rawText.length + ' chars)';
            content.innerHTML = marked.parse(rawText, { async: false });
            article.scrollTop = article.scrollHeight;
          }

          clearTimeout(timeoutId);

          const sessionMatch = rawText.match(/<!--SESSION:([a-f0-9-]+)-->/);
          if (sessionMatch) {
            sessionId = sessionMatch[1];
            rawText = rawText.replace(/<!--SESSION:[a-f0-9-]+-->/, '');
          }
          rawText = rawText.replace(/<!--FALLBACK:true-->/, '');
          rawText = rawText.replace(/<!--ERROR:[\s\S]+?-->/, '');
          content.innerHTML = marked.parse(rawText, { async: false });
          // Skip typewriter for cloud models - already displayed in real-time
          indicator.classList.add('hidden');
          add5w1hButtons(content);
          btn.disabled = false;
          btnText.textContent = '✨ 第二步：生成文章';
          spinner.classList.add('hidden');
          return;
        }

        // Typewriter display
        const TYPE_MS = 18;
        const PUNCT_MS = 60;
        const charsPerTick = 2;
        let displayed = '';
        let i = 0;

        const tick = () => {
          if (i >= rawText.length) {
            content.innerHTML = marked.parse(rawText, { async: false });
            indicator.classList.add('hidden');
            add5w1hButtons(content);
            btn.disabled = false;
            btnText.textContent = '✨ 第二步：生成文章';
            spinner.classList.add('hidden');
            return;
          }

          const n = Math.min(charsPerTick, rawText.length - i);
          displayed = rawText.slice(0, i + n);
          i += n;

          content.innerHTML = marked.parse(displayed, { async: false });

          const last = displayed.slice(-1);
          let delay = TYPE_MS;
          if ('。！？.!?;；,，'.indexOf(last) >= 0) delay = PUNCT_MS;
          else if (last.charCodeAt(0) === 10) delay = PUNCT_MS + 40;

          setTimeout(tick, delay);
        };

        tick();

      } catch (err) {
        clearTimeout(timeoutId);
        indicator.classList.add('hidden');
        content.innerHTML = '<div class="text-red-600 text-sm">错误: ' + err.message + '</div>';
        btn.disabled = false;
        btnText.textContent = '✨ 第二步：生成文章';
        spinner.classList.add('hidden');
      }
    }

    function add5w1hButtons(container) {
      // Remove existing wrappers/panels to avoid duplication
      container.querySelectorAll('.chapter-section').forEach(w => {
        const panel = w.nextElementSibling;
        if (panel && panel.id && panel.id.startsWith('5w1h-')) panel.remove();
        const h2 = w.querySelector('h2');
        if (h2) w.parentNode.insertBefore(h2, w);
        w.remove();
      });

      const headings = container.querySelectorAll('h2');
      headings.forEach((h2, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'chapter-section flex items-center gap-3 mb-2';
        h2.parentNode.insertBefore(wrapper, h2);
        wrapper.appendChild(h2);

        const btn = document.createElement('button');
        btn.className = 'chapter-btn text-xs font-medium text-blue-600 hover:text-blue-800 border border-blue-200 hover:border-blue-400 rounded px-2 py-0.5 transition';
        btn.textContent = '5W1H';
        btn.onclick = () => toggle5w1h(idx, wrapper);
        wrapper.appendChild(btn);

        const panel = document.createElement('div');
        panel.id = '5w1h-' + idx;
        panel.className = 'hidden mt-3 mb-6 bg-slate-50 rounded-lg border border-slate-200 overflow-hidden';
        wrapper.parentNode.insertBefore(panel, wrapper.nextSibling);
      });
    }

    async function toggle5w1h(chapterIndex, wrapper) {
      const panel = document.getElementById('5w1h-' + chapterIndex);
      if (!sessionId) return;

      if (panel.classList.contains('hidden')) {
        panel.classList.remove('hidden');
        panel.innerHTML = '<div class="p-4 flex items-center gap-2 text-sm text-slate-500"><div class="spinner"></div> 生成总结中...</div>';

        try {
          const h2 = wrapper.querySelector('h2');
          const title = h2 ? h2.textContent.trim() : '';
          
          // Find chapter content between this wrapper and the next wrapper (or end)
          let chapterContent = '';
          let nextEl = wrapper.nextElementSibling;
          while (nextEl && !nextEl.classList.contains('chapter-section')) {
            if (!nextEl.id || !nextEl.id.startsWith('5w1h-')) {
              chapterContent += nextEl.textContent + '\n';
            }
            nextEl = nextEl.nextElementSibling;
          }

          let data;
          if (sessionId === 'lmstudio-session') {
            // LM Studio mode: direct browser call to localhost
            data = await callLMStudio5w1h(
              document.getElementById('articleContent').textContent,
              title,
              chapterContent.trim()
            );
            if (!data) throw new Error('无法解析 LM Studio 返回的 JSON');
          } else {
            const cloudModel = document.getElementById('generateModelSelect').value;
            const res = await fetch(API_BASE + '/api/summarize', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sessionId, chapterIndex, model: cloudModel })
            });
            data = await res.json();
            if (!res.ok) throw new Error(data.error || '总结失败');
          }
          panel.innerHTML = render5w1hTable(data);
        } catch (err) {
          panel.innerHTML = '<div class="p-4 text-red-600 text-sm">' + err.message + '</div>';
        }
      } else {
        panel.classList.add('hidden');
      }
    }

    async function streamLMStudioDirect(subtitles, reqs, contentEl, indicatorEl) {
      const reqBlock = [];
      if (reqs.taskType) reqBlock.push('- 任务类型：' + reqs.taskType);
      if (reqs.style) reqBlock.push('- 输出风格：' + reqs.style);
      if (reqs.audience) reqBlock.push('- 目标受众：' + reqs.audience);
      if (reqs.constraints) reqBlock.push('- 约束条件：' + reqs.constraints);

      const prompt = '【系统指令】你是一位资深中文科技内容编辑。你的唯一任务是按照以下用户要求撰写文章。\n\n【重要】用户生成要求具有最高优先级，必须严格遵守。任何违反用户要求的内容都是错误的。\n\n' + (reqBlock.length > 0 ? '## 用户生成要求（最高优先级指令 — 必须严格遵守）\n' + reqBlock.join('\n') + '\n\n' : '') + '## 字幕内容\n' + subtitles + '\n\n## 输出要求\n1. 文章必须按章节组织，每个章节标题以 ## 开头。\n2. 以对话或叙述形式呈现视频的核心内容，保留对话者的原意和语气。\n3. 排版清晰、逻辑连贯，使用恰当的段落分隔。\n4. 突出视频中的关键观点、论据和数据，不要遗漏重要信息。\n5. 语言流畅自然，符合中文阅读习惯。\n6. 不要在文末添加总结或结语之类的固定套路段落。\n7. 必须严格遵守上方的「用户生成要求」。如果用户要求限制字数，必须精确控制；如果用户要求特定风格，必须明确体现。\n8. 在输出文章前，先自检：是否违反了用户生成要求？如果有，立即修正。\n\n请直接输出文章正文，不要包含前言、元信息或自检说明。';

      const res = await fetch('http://localhost:1234/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer not-needed' },
        body: JSON.stringify({
          model: 'gemma-4-26b-a4b-it',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.7,
          max_tokens: 4096,
          stream: true
        })
      });

      if (!res.ok) throw new Error('LM Studio error: ' + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';
      let chunkCount = 0;

      // Show a streaming indicator
      indicatorEl.textContent = '生成中 (' + chunkCount + ' chunks)';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data: ')) continue;
          const json = trimmed.slice(6);
          if (json === '[DONE]') continue;
          try {
            const obj = JSON.parse(json);
            const text = obj.choices?.[0]?.delta?.content || obj.choices?.[0]?.delta?.reasoning_content || '';
            if (text) {
              fullText += text;
              chunkCount++;
              indicatorEl.textContent = '生成中 (' + chunkCount + ' chunks, ' + fullText.length + ' chars)';
              contentEl.innerHTML = marked.parse(fullText, { async: false });
              document.getElementById('article').scrollTop = document.getElementById('article').scrollHeight;
            }
          } catch {}
        }
      }
      return fullText;
    }

    async function callLMStudio5w1h(fullArticle, title, content) {
      const reqBlock = [
        '你是一位专业编辑。请基于以下视频完整文章和当前章节，提炼出该章节的 5W1H 总结。',
        '',
        '## 完整文章内容',
        fullArticle.slice(0, 8000),
        '',
        '## 当前章节',
        '标题：' + title,
        '内容：' + content,
        '',
        '## 输出要求',
        '1. 请只输出一个纯 JSON 对象，不要包含 markdown 代码块标记（如 ```json），不要添加任何额外文字、解释或前言。',
        '2. JSON 必须严格符合以下格式，键名必须是 who/what/when/where/why/how，不能有任何其他字段：',
        '',
        '{"who":"...","what":"...","when":"...","where":"...","why":"...","how":"..."}',
        '',
        '3. 每个字段简洁凝练，一句话概括，不超过 80 字。',
        '4. 如果某个维度在章节中确实没有体现，可以填写\"未明确提及\"，但不能省略该字段。'
      ].join('\n');

      const res = await fetch('http://localhost:1234/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer not-needed' },
        body: JSON.stringify({
          model: 'gemma-4-26b-a4b-it',
          messages: [{ role: 'user', content: reqBlock }],
          temperature: 0.5,
          max_tokens: 2048,
          stream: false
        })
      });

      if (!res.ok) throw new Error('LM Studio error: ' + res.status);

      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content || '';
      return extractJsonFromResponse(raw);
    }

    function extractJsonFromResponse(text) {
      const trimmed = text.trim();

      const codeBlockMatch = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (codeBlockMatch) {
        try { return JSON.parse(codeBlockMatch[1].trim()); } catch {}
      }

      const objectMatch = trimmed.match(/\{[\s\S]*?\}/);
      if (objectMatch) {
        try { return JSON.parse(objectMatch[0]); } catch {}
      }

      try { return JSON.parse(trimmed); } catch {}

      return null;
    }

    function render5w1hTable(data) {
      const rows = [
        { key: 'Who', value: data.who, icon: '👤' },
        { key: 'What', value: data.what, icon: '💡' },
        { key: 'When', value: data.when, icon: '📅' },
        { key: 'Where', value: data.where, icon: '🌍' },
        { key: 'Why', value: data.why, icon: '❓' },
        { key: 'How', value: data.how, icon: '⚙️' },
      ];
      return '<div class="fade-in"><table class="w-full text-sm"><tbody>' +
        rows.map(r => '<tr class="border-b border-slate-200 last:border-0">' +
          '<td class="w-20 py-3 px-4 font-semibold text-slate-700 bg-slate-100/50">' + r.icon + ' ' + r.key + '</td>' +
          '<td class="py-3 px-4 text-slate-800">' + r.value + '</td>' +
        '</tr>').join('') +
        '</tbody></table></div>';
    }
  </script>
